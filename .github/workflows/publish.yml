name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.version.outputs.publish }}
      old_version: ${{ steps.version.outputs.old_version }}
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install version parser
        run: python -m pip install packaging

      - name: Detect version bump
        id: version
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tomllib

          from packaging.version import Version

          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          zero_sha = "0" * 40
          new_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())['project']['version']
          old_version = ""
          publish = False

          if before and before != zero_sha:
              try:
                  old_bytes = subprocess.check_output(["git", "show", f"{before}:pyproject.toml"])
              except subprocess.CalledProcessError:
                  old_bytes = b""
              if old_bytes:
                  old_version = tomllib.loads(old_bytes.decode())['project']['version']
                  publish = Version(new_version) > Version(old_version)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"publish={'true' if publish else 'false'}\n")
              output.write(f"old_version={old_version}\n")
              output.write(f"new_version={new_version}\n")
          PY

      - name: Report version decision
        run: |
          echo "Previous version: ${{ steps.version.outputs.old_version || 'n/a' }}"
          echo "Current version: ${{ steps.version.outputs.new_version }}"
          echo "Publish: ${{ steps.version.outputs.publish }}"

  checks:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run unit tests
        run: PYTHONPATH=src python -m pytest tests/unit

  build:
    needs:
      - gate
      - checks
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs:
      - gate
      - build
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bulletjournal-editor/
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
